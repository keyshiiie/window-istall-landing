<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пластика окон</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <!-- Верхняя часть хедера -->
        <div class="header__top">
          <div class="header__top-row">
            <!-- Логотип -->
            <div class="header__logo">
              <img src="/images/icons/logo.svg" alt="Логотип" class="header__logo-img">
            </div>
            <!-- График работы -->
            <div class="header__schedule">
              <div class="header__schedule-text">
                <span class="header__schedule-line">5 офисов продаж</span>
                <span class="header__schedule-line">ПН-ВС</span>
                <span class="header__schedule-line">с 9:00 до 21:00</span> 
              </div>
            </div>
          </div>
          <!-- Номер и кнопка -->
          <div class="header__contacts">
            <h2 class="header__contacts-phone">+7 495 126 67 25</h2>
            <button class="header__contacts-button button button--fill">Заказать звонок</button>
          </div>
        </div>
        <div class="header__bottom">
          <nav class="header__nav">
            <ul class="header__nav-list">
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Модели</a>
              </li>
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Калькулятор</a>
              </li>
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Рассрочка</a>
              </li>
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Монтаж</a>
              </li>
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Наши работы</a>
              </li>
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Отзывы</a>
              </li>
              <li class="header__nav-item">
                <a href="#" class="header__nav-link">Контакты</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
